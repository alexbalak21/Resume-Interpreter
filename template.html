<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV - {{FULL_NAME}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="page">

        <!-- ===================== ASIDE / SIDEBAR ===================== -->
        <aside>
            <div id="photo-container">
                <img src="photo.jpg" alt="Photo de profil" id="photo">
            </div>

            <div class="aside-block" id="profile">
                <h3 class="aside-title">Profil</h3>
                {{PROFILE}}
            </div>

            <div class="aside-block" id="skills">
                <h3 class="aside-title">Compétences</h3>
                {{SKILLS}}
            </div>

            <div class="aside-block" id="certifications">
                <h3 class="aside-title">Certifications</h3>
                {{CERTIFICATIONS}}
            </div>

            <div class="aside-block" id="languages">
                <h3 class="aside-title">Langues</h3>
                {{LANGUAGES}}
            </div>

            <div class="aside-block" id="hobbies">
                <h3 class="aside-title">Intérêts</h3>
                {{HOBBIES}}
            </div>
        </aside>

        <!-- ===================== MAIN CONTENT ===================== -->
        <main>
            <header id="main-header">
                <div id="header-text">
                    <h1 id="name">{{FULL_NAME}}</h1>
                    <h2 id="job">{{JOB_TITLE}}</h2>
                    <div id="links">
                        {{LINKS}}
                    </div>
                </div>
                <div id="header-icon">&lt;/&gt;</div>
            </header>

            <section id="contact">
                <h3 class="section-title">Contact</h3>
                <div class="contact-grid">
                    {{CONTACT}}
                </div>
            </section>

            <section id="experience">
                <h3 class="section-title">Expériences Professionnelles</h3>
                <div class="timeline">
                    {{EXPERIENCE}}
                </div>
            </section>

            <section id="education">
                <h3 class="section-title">Formations</h3>
                <div class="timeline">
                    {{EDUCATION}}
                </div>
            </section>

        </main>
    </div>
</body>
</html>
